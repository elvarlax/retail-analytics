version: 2

models:
  - name: int_order_items_enriched
    description: >
      Canonical line-item view. Joins order items with their parent order and product.
      This is the single complex join in the pipeline.
    columns:
      - name: order_item_id
        description: "Primary key. Grain: one row per order line item."
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: quantity
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: line_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: order_total_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: order_date
        tests: [not_null]
      - name: order_status_changed_at
        description: "Timestamp of the most recent status change for the parent order. NULL for orders still in their initial Pending state."
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Pending', 'Completed', 'Cancelled']

  - name: int_orders_enriched
    description: >
      Order-level view. Joins orders with their customer and derives analytical
      convenience columns.
    columns:
      - name: order_id
        description: "Primary key. Grain: one row per order."
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: total_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: order_date
        tests: [not_null]
      - name: order_month
        tests: [not_null]
      - name: order_status_changed_at
        description: "Timestamp of the most recent status change. NULL for orders still in their initial Pending state."
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Pending', 'Completed', 'Cancelled']
