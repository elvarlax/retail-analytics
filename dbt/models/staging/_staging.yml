version: 2

models:
  - name: stg_customers
    description: >
      One row per customer. Renames the source primary key (id) to customer_id
      and derives full_name. Staging only — renaming and casting, no business logic.
    columns:
      - name: customer_id
        description: "Primary key (uuid). Source: customers.id."
        tests: [unique, not_null]

      - name: first_name
        description: "Customer given name."
        tests:
          - not_null

      - name: last_name
        description: "Customer family name."
        tests:
          - not_null

      - name: email
        description: "Unique email address. Used as a natural key in dim_customers."
        tests:
          - unique
          - not_null

  - name: stg_products
    description: "One row per product."
    columns:
      - name: product_id
        tests: [unique, not_null]
      - name: sku
        tests: [unique, not_null]
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: image_url
        description: "Optional product image URL for storefront display. NULL for products created before image support was added."

  - name: stg_orders
    description: "One row per order."
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Pending', 'Completed', 'Cancelled']
      - name: total_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: status_changed_at
        description: "Timestamp of the most recent status change event. NULL for orders still in their initial Pending state."

  - name: stg_order_items
    description: "One row per order line item."
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: quantity
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: line_amount
        description: "Gross line revenue (quantity × unit_price). Fully additive across all dimensions."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
