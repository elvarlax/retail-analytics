retail_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'warehouse') }}"
      port: "{{ env_var('DBT_PORT', '5432') | int }}"
      user: postgres
      password: postgres
      dbname: retail_warehouse
      # generate_schema_name macro routes each layer to its own schema
      # (staging / intermediate / marts). This default is never used directly.
      schema: public
      threads: 4
