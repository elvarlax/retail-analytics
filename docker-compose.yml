services:
  warehouse:
    image: postgres:16
    container_name: retail_analytics_warehouse
    restart: always
    environment:
      POSTGRES_DB: retail_warehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: retail_analytics_consumer
    restart: always
    depends_on:
      warehouse:
        condition: service_healthy
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      SERVICE_BUS_CONNECTION_STRING: ${SERVICE_BUS_CONNECTION_STRING}
      SERVICE_BUS_TOPIC: ${SERVICE_BUS_TOPIC:-retail.events}
      SERVICE_BUS_SUBSCRIPTION: ${SERVICE_BUS_SUBSCRIPTION:-analytics-sub}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      WAREHOUSE_DB_HOST: warehouse
      WAREHOUSE_DB_PORT: 5432
      WAREHOUSE_DB_NAME: retail_warehouse
      WAREHOUSE_DB_USER: postgres
      WAREHOUSE_DB_PASSWORD: postgres

  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    container_name: retail_analytics_dbt
    depends_on:
      warehouse:
        condition: service_healthy
    environment:
      DBT_PROFILES_DIR: /usr/app
    profiles:
      - dbt
    volumes:
      - ./dbt:/usr/app

volumes:
  warehouse_data: