version: 2

models:
  - name: int_order_items_enriched
    description: >
      Canonical line-item view. Joins order items with their parent order and product.
      This is the single complex join in the pipeline.
    columns:
      - name: order_item_id
        description: "Primary key. Grain: one row per order line item."
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: line_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: order_date
        tests: [not_null]
      - name: status
        tests: [not_null]

  - name: int_orders_enriched
    description: >
      Order-level view. Joins orders with their customer and derives analytical
      convenience columns.
    columns:
      - name: order_id
        description: "Primary key. Grain: one row per order."
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: total_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: order_date
        tests: [not_null]
      - name: order_month
        tests: [not_null]
      - name: status
        tests: [not_null]
