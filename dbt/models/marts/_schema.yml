version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension. One row per customer. Conforms to the star schema —
      join to fact_order_items or fact_orders on customer_id.
    columns:
      - name: customer_id
        description: "Primary key (uuid)."
        tests: [unique, not_null]
      - name: first_name
        description: "Customer given name."
      - name: last_name
        description: "Customer family name."
      - name: full_name
        description: "Concatenated display name for reporting."
      - name: email
        description: "Unique email address. Natural key."
        tests: [unique, not_null]

  - name: dim_products
    description: >
      Product dimension. One row per product.
    columns:
      - name: product_id
        description: "Primary key (uuid)."
        tests: [unique, not_null]
      - name: product_name
        description: "Product display name."
      - name: sku
        description: "Stock-keeping unit identifier. Unique per product."
        tests: [unique, not_null]
      - name: unit_price
        description: "Current list price per unit."

  - name: dim_date
    description: >
      Date dimension generated via generate_series.
    columns:
      - name: date_key
        description: "Primary key (calendar date)."
        tests: [unique, not_null]
      - name: year
      - name: quarter
      - name: month
      - name: month_name
      - name: week_of_year
      - name: day
      - name: day_of_week
      - name: day_name
      - name: is_weekend

  - name: fact_order_items
    description: >
      Fact table at order-line grain. One row per order line item.
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 100000
            max_value: 500000
    columns:
      - name: order_item_id
        description: "Primary key."
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: quantity
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: unit_price
      - name: line_amount
      - name: order_total_amount
      - name: is_completed
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['Pending', 'Completed', 'Cancelled']
      - name: order_created_at
      - name: order_completed_at

  - name: fact_orders
    description: >
      Fact table at order grain. One row per order.
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 50000
            max_value: 200000
    columns:
      - name: order_id
        description: "Primary key."
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: total_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: is_completed
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['Pending', 'Completed', 'Cancelled']
      - name: order_month
      - name: order_created_at
      - name: order_completed_at
