version: 2

sources:
  - name: events
    schema: events
    description: "Raw events ingested from Azure Service Bus (retail.events topic)."

    tables:
      - name: retail_events
        description: "One row per event received from the RetailInventory service."

        columns:
          - name: event_id
            description: "UUID primary key. Sourced from the EventId field in the event payload."
          - name: event_type
            description: "Event type (CustomerCreatedV1, ProductCreatedV1, OrderPlacedV1, OrderStatusChangedV1)."
          - name: payload
            description: "Full event payload as JSONB."
          - name: source
            description: "Publishing service, from Service Bus application properties."
          - name: occurred_at_utc
            description: "When the event occurred in the source system."
          - name: received_at
            description: "When the consumer wrote the row."
