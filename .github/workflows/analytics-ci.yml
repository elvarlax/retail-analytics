name: Retail Analytics - ELT & dbt CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # ---------------------------------------------------------
    # Service containers
    # Format: HOST_PORT:CONTAINER_PORT
    # Vinstri = outside (runner)
    # Hægri  = inside (container)
    # ---------------------------------------------------------
    services:
      # OLTP database (source system)
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retail_inventory
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      # Analytics warehouse
      warehouse:
        image: postgres:16
        ports:
          - 5434:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retail_warehouse
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ---------------------------------------------------------
      # Checkout analytics repo
      # ---------------------------------------------------------
      - name: Checkout retail-analytics
        uses: actions/checkout@v3

      # ---------------------------------------------------------
      # Checkout OLTP repo (schema source of truth)
      # ---------------------------------------------------------
      - name: Checkout retail-inventory
        uses: actions/checkout@v3
        with:
          repository: elvarlax/retail-inventory
          path: retail-inventory

      # ---------------------------------------------------------
      # Wait for Postgres services to become healthy
      # ---------------------------------------------------------
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5433 -U postgres; do sleep 2; done
          until pg_isready -h localhost -p 5434 -U postgres; do sleep 2; done

      # ---------------------------------------------------------
      # Apply EF Core migrations (creates OLTP schema)
      # ---------------------------------------------------------
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Apply retail-inventory migrations
        working-directory: retail-inventory
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5433;Database=retail_inventory;Username=postgres;Password=postgres
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet ef database update \
            --configuration Release \
            --project RetailInventory.Api/RetailInventory.Api.csproj \
            --startup-project RetailInventory.Api/RetailInventory.Api.csproj

      # ---------------------------------------------------------
      # Python setup for extract + dbt
      # ---------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python + dbt dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg[binary] python-dotenv dbt-postgres

      # ---------------------------------------------------------
      # Extract step (OLTP → raw)
      # ---------------------------------------------------------
      - name: Run Extract Script
        run: python extract/extract.py
        env:
          SOURCE_DB_HOST: localhost
          SOURCE_DB_PORT: 5433
          SOURCE_DB_NAME: retail_inventory
          SOURCE_DB_USER: postgres
          SOURCE_DB_PASSWORD: postgres

          TARGET_DB_HOST: localhost
          TARGET_DB_PORT: 5434
          TARGET_DB_NAME: retail_warehouse
          TARGET_DB_USER: postgres
          TARGET_DB_PASSWORD: postgres

      # ---------------------------------------------------------
      # dbt build (run + test)
      # Override host/port because CI uses localhost
      # ---------------------------------------------------------
      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt debug
        working-directory: dbt
        run: dbt debug --profiles-dir .
        env:
          DBT_HOST: localhost
          DBT_PORT: 5434

      - name: dbt build
        working-directory: dbt
        run: dbt build --profiles-dir .
        env:
          DBT_HOST: localhost
          DBT_PORT: 5434