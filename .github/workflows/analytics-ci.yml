name: Retail Analytics - ELT & dbt CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retail_inventory
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      warehouse:
        image: postgres:16
        ports:
          - 5434:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retail_warehouse
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5433 -U postgres; do sleep 2; done
          until pg_isready -h localhost -p 5434 -U postgres; do sleep 2; done

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python + dbt Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg[binary] python-dotenv dbt-postgres dbt-utils dbt-expectations

      - name: Run Extract Script
        run: python extract/extract.py
        env:
          SOURCE_DB_HOST: localhost
          SOURCE_DB_PORT: 5433
          SOURCE_DB_NAME: retail_inventory
          SOURCE_DB_USER: postgres
          SOURCE_DB_PASSWORD: postgres
          TARGET_DB_HOST: localhost
          TARGET_DB_PORT: 5434
          TARGET_DB_NAME: retail_warehouse
          TARGET_DB_USER: postgres
          TARGET_DB_PASSWORD: postgres

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt debug
        working-directory: dbt
        run: dbt debug --profiles-dir .

      - name: dbt run
        working-directory: dbt
        run: dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt
        run: dbt test --profiles-dir .