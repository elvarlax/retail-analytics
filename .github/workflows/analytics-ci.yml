name: Retail Analytics - Event-Driven dbt CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      warehouse:
        image: postgres:16
        ports:
          - 5434:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retail_warehouse
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout retail-analytics
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize event source table
        env:
          PGPASSWORD: postgres
        run: |
          psql "host=localhost port=5434 dbname=retail_warehouse user=postgres" -c "CREATE SCHEMA IF NOT EXISTS events;"
          psql "host=localhost port=5434 dbname=retail_warehouse user=postgres" -c "CREATE TABLE IF NOT EXISTS events.retail_events (event_id UUID PRIMARY KEY, event_type TEXT NOT NULL, payload JSONB NOT NULL, source TEXT, occurred_at_utc TIMESTAMPTZ, received_at TIMESTAMPTZ NOT NULL DEFAULT NOW());"
          psql "host=localhost port=5434 dbname=retail_warehouse user=postgres" -c "CREATE INDEX IF NOT EXISTS idx_retail_events_event_type ON events.retail_events (event_type);"
          psql "host=localhost port=5434 dbname=retail_warehouse user=postgres" -c "CREATE INDEX IF NOT EXISTS idx_retail_events_occurred_at_utc ON events.retail_events (occurred_at_utc);"

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt build
        working-directory: dbt
        run: dbt build --profiles-dir .
        env:
          DBT_HOST: localhost
          DBT_PORT: 5434
