version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension. One row per customer.
    columns:
      - name: customer_key
        description: "Surrogate key."
        tests: [unique, not_null]
      - name: customer_id
        description: "Natural key from source system."
        tests: [unique, not_null]
      - name: full_name
        description: "Concatenated display name."
      - name: email
        description: "Unique email address."
        tests: [unique, not_null]

  - name: dim_products
    description: >
      Product dimension. One row per product.
    columns:
      - name: product_key
        description: "Surrogate key."
        tests: [unique, not_null]
      - name: product_id
        description: "Natural key from source system."
        tests: [unique, not_null]
      - name: sku
        description: "Stock-keeping unit. Unique per product."
        tests: [unique, not_null]
      - name: unit_price
        description: "Current list price per unit."

  - name: dim_date
    description: >
      Date dimension generated via generate_series.
    columns:
      - name: date_key
        description: "Primary key (calendar date)."
        tests: [unique, not_null]
      - name: year
      - name: quarter
      - name: month
      - name: month_name
      - name: week_of_year
      - name: day
      - name: day_of_week
      - name: day_name
      - name: is_weekend

  - name: fact_order_items
    description: >
      Fact table at order-line grain. One row per order line item.
    columns:
      - name: order_item_id
        description: "Primary key."
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: quantity
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: line_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: order_total_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: is_completed
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['Pending', 'Completed', 'Cancelled']
      - name: order_created_at
      - name: order_completed_at

  - name: fact_orders
    description: >
      Fact table at order grain. One row per order.
    columns:
      - name: order_id
        description: "Primary key."
        tests: [unique, not_null]
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: total_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: is_completed
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['Pending', 'Completed', 'Cancelled']
      - name: order_month
        tests: [not_null]
      - name: order_created_at
      - name: order_completed_at
